<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <defs>
    <linearGradient id="aud-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a2a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f1510;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#aud-grad)"/>
  
  <!-- Auditorium seating layout -->
  <g opacity="0.4">
    <!-- Stage -->
    <rect x="550" y="150" width="500" height="120" fill="none" stroke="#C9A96E" stroke-width="3" rx="8"/>
    <line x1="570" y1="180" x2="930" y2="180" stroke="#C9A96E" stroke-width="2" opacity="0.7"/>
    <line x1="570" y1="210" x2="930" y2="210" stroke="#C9A96E" stroke-width="2" opacity="0.7"/>
    
    <!-- Seating rows -->
    <g opacity="0.6">
      <circle cx="300" cy="400" r="6" fill="#C9A96E"/>
      <circle cx="370" cy="400" r="6" fill="#C9A96E"/>
      <circle cx="440" cy="400" r="6" fill="#C9A96E"/>
      <circle cx="510" cy="400" r="6" fill="#C9A96E"/>
      <circle cx="580" cy="400" r="6" fill="#C9A96E"/>
      <circle cx="650" cy="400" r="6" fill="#C9A96E"/>
      <circle cx="720" cy="400" r="6" fill="#C9A96E"/>
      
      <circle cx="300" cy="480" r="6" fill="#C9A96E"/>
      <circle cx="370" cy="480" r="6" fill="#C9A96E"/>
      <circle cx="440" cy="480" r="6" fill="#C9A96E"/>
      <circle cx="510" cy="480" r="6" fill="#C9A96E"/>
      <circle cx="580" cy="480" r="6" fill="#C9A96E"/>
      <circle cx="650" cy="480" r="6" fill="#C9A96E"/>
      <circle cx="720" cy="480" r="6" fill="#C9A96E"/>
      
      <circle cx="300" cy="560" r="6" fill="#C9A96E"/>
      <circle cx="370" cy="560" r="6" fill="#C9A96E"/>
      <circle cx="440" cy="560" r="6" fill="#C9A96E"/>
      <circle cx="510" cy="560" r="6" fill="#C9A96E"/>
      <circle cx="580" cy="560" r="6" fill="#C9A96E"/>
      <circle cx="650" cy="560" r="6" fill="#C9A96E"/>
      <circle cx="720" cy="560" r="6" fill="#C9A96E"/>
    </g>
  </g>
  
  <!-- Spotlight effect -->
  <g opacity="0.2">
    <path d="M 800 50 L 750 400 L 850 400 Z" fill="none" stroke="#C9A96E" stroke-width="2"/>
  </g>
  
  <!-- Text overlay -->
  <text x="800" y="550" font-family="Cormorant Garamond, serif" font-size="72" font-weight="300" fill="#C9A96E" text-anchor="middle">
    Main Auditorium
  </text>
  <text x="800" y="640" font-family="Cormorant Garamond, serif" font-size="72" font-weight="300" fill="#C9A96E" text-anchor="middle">
    and Seminar Spaces
  </text>
  <text x="800" y="750" font-family="DM Sans, sans-serif" font-size="32" fill="#C9A96E" text-anchor="middle" opacity="0.8">
    Conferences • Lectures • Academic Ceremonies
  </text>
</svg>