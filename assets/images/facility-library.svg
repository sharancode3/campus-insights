<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <defs>
    <linearGradient id="lib-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1f47;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15101f;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#lib-grad)"/>
  
  <!-- Books on shelves -->
  <g opacity="0.35">
    <!-- Shelf 1 -->
    <line x1="200" y1="250" x2="1400" y2="250" stroke="#C9A96E" stroke-width="2"/>
    <rect x="250" y="180" width="35" height="65" fill="#C9A96E" opacity="0.7"/>
    <rect x="310" y="190" width="35" height="55" fill="#C9A96E" opacity="0.6"/>
    <rect x="370" y="185" width="35" height="60" fill="#C9A96E" opacity="0.65"/>
    <rect x="430" y="195" width="35" height="50" fill="#C9A96E" opacity="0.6"/>
    <rect x="490" y="180" width="35" height="65" fill="#C9A96E" opacity="0.7"/>
    
    <!-- Shelf 2 -->
    <line x1="200" y1="450" x2="1400" y2="450" stroke="#C9A96E" stroke-width="2"/>
    <rect x="250" y="380" width="35" height="65" fill="#C9A96E" opacity="0.7"/>
    <rect x="310" y="390" width="35" height="55" fill="#C9A96E" opacity="0.6"/>
    <rect x="370" y="385" width="35" height="60" fill="#C9A96E" opacity="0.65"/>
    <rect x="430" y="395" width="35" height="50" fill="#C9A96E" opacity="0.6"/>
    <rect x="490" y="380" width="35" height="65" fill="#C9A96E" opacity="0.7"/>
    
    <!-- Shelf 3 -->
    <line x1="200" y1="650" x2="1400" y2="650" stroke="#C9A96E" stroke-width="2"/>
    <rect x="250" y="580" width="35" height="65" fill="#C9A96E" opacity="0.7"/>
    <rect x="310" y="590" width="35" height="55" fill="#C9A96E" opacity="0.6"/>
    <rect x="370" y="585" width="35" height="60" fill="#C9A96E" opacity="0.65"/>
  </g>
  
  <!-- Reading symbol -->
  <g opacity="0.2">
    <path d="M 1050 350 Q 1100 300 1150 350 Q 1100 400 1050 350" fill="none" stroke="#C9A96E" stroke-width="2"/>
    <line x1="1000" y1="450" x2="1200" y2="450" stroke="#C9A96E" stroke-width="2" opacity="0.6"/>
    <line x1="1000" y1="480" x2="1180" y2="480" stroke="#C9A96E" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Text overlay -->
  <text x="800" y="550" font-family="Cormorant Garamond, serif" font-size="72" font-weight="300" fill="#C9A96E" text-anchor="middle">
    Central Library
  </text>
  <text x="800" y="640" font-family="Cormorant Garamond, serif" font-size="72" font-weight="300" fill="#C9A96E" text-anchor="middle">
    and Reading Halls
  </text>
  <text x="800" y="750" font-family="DM Sans, sans-serif" font-size="32" fill="#C9A96E" text-anchor="middle" opacity="0.8">
    Digital Resources • Reference Collections • Study Zones
  </text>
</svg>