<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <defs>
    <linearGradient id="host-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1f15;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#host-grad)"/>
  
  <!-- Residential building blocks -->
  <g opacity="0.35">
    <!-- Building 1 -->
    <rect x="200" y="280" width="180" height="320" fill="none" stroke="#C9A96E" stroke-width="2" rx="8"/>
    <line x1="240" y1="280" x2="240" y2="600" stroke="#C9A96E" stroke-width="1" opacity="0.5"/>
    <line x1="280" y1="280" x2="280" y2="600" stroke="#C9A96E" stroke-width="1" opacity="0.5"/>
    <line x1="320" y1="280" x2="320" y2="600" stroke="#C9A96E" stroke-width="1" opacity="0.5"/>
    
    <!-- Windows -->
    <rect x="210" y="305" width="20" height="20" fill="none" stroke="#C9A96E" stroke-width="1" opacity="0.6"/>
    <rect x="245" y="305" width="20" height="20" fill="none" stroke="#C9A96E" stroke-width="1" opacity="0.6"/>
    <rect x="280" y="305" width="20" height="20" fill="none" stroke="#C9A96E" stroke-width="1" opacity="0.6"/>
    <rect x="315" y="305" width="20" height="20" fill="none" stroke="#C9A96E" stroke-width="1" opacity="0.6"/>
    <rect x="350" y="305" width="20" height="20" fill="none" stroke="#C9A96E" stroke-width="1" opacity="0.6"/>
    
    <!-- Building 2 -->
    <rect x="650" y="250" width="180" height="350" fill="none" stroke="#C9A96E" stroke-width="2" rx="8"/>
    <line x1="690" y1="250" x2="690" y2="600" stroke="#C9A96E" stroke-width="1" opacity="0.5"/>
    <line x1="730" y1="250" x2="730" y2="600" stroke="#C9A96E" stroke-width="1" opacity="0.5"/>
    <line x1="770" y1="250" x2="770" y2="600" stroke="#C9A96E" stroke-width="1" opacity="0.5"/>
    
    <!-- Building 3 -->
    <rect x="1100" y="300" width="180" height="300" fill="none" stroke="#C9A96E" stroke-width="2" rx="8"/>
    <line x1="1140" y1="300" x2="1140" y2="600" stroke="#C9A96E" stroke-width="1" opacity="0.5"/>
    <line x1="1180" y1="300" x2="1180" y2="600" stroke="#C9A96E" stroke-width="1" opacity="0.5"/>
    <line x1="1220" y1="300" x2="1220" y2="600" stroke="#C9A96E" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Common area symbol -->
  <g opacity="0.2">
    <circle cx="750" cy="750" r="80" fill="none" stroke="#C9A96E" stroke-width="2"/>
    <circle cx="700" cy="750" r="30" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
    <circle cx="800" cy="750" r="30" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Text overlay -->
  <text x="800" y="550" font-family="Cormorant Garamond, serif" font-size="72" font-weight="300" fill="#C9A96E" text-anchor="middle">
    Student Hostels
  </text>
  <text x="800" y="640" font-family="Cormorant Garamond, serif" font-size="72" font-weight="300" fill="#C9A96E" text-anchor="middle">
    and Residential Life
  </text>
  <text x="800" y="750" font-family="DM Sans, sans-serif" font-size="32" fill="#C9A96E" text-anchor="middle" opacity="0.8">
    Safe Residences • Common Areas • Study Spaces
  </text>
</svg>