<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <defs>
    <linearGradient id="canteen-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a2a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f1510;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#canteen-grad)"/>
  
  <!-- Dining space -->
  <g opacity="0.35">
    <!-- Tables -->
    <rect x="250" y="300" width="120" height="80" fill="none" stroke="#C9A96E" stroke-width="2" rx="4"/>
    <circle cx="310" cy="340" r="30" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
    
    <rect x="550" y="300" width="120" height="80" fill="none" stroke="#C9A96E" stroke-width="2" rx="4"/>
    <circle cx="610" cy="340" r="30" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
    
    <rect x="850" y="300" width="120" height="80" fill="none" stroke="#C9A96E" stroke-width="2" rx="4"/>
    <circle cx="910" cy="340" r="30" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Counter -->
    <rect x="200" y="500" width="900" height="100" fill="none" stroke="#C9A96E" stroke-width="2" rx="6"/>
    <line x1="300" y1="500" x2="300" y2="600" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
    <line x1="450" y1="500" x2="450" y2="600" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
    <line x1="600" y1="500" x2="600" y2="600" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
    <line x1="750" y1="500" x2="750" y2="600" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Food items symbol -->
  <g opacity="0.2">
    <circle cx="1150" cy="400" r="15" fill="#C9A96E" opacity="0.6"/>
    <circle cx="1200" cy="390" r="18" fill="#C9A96E" opacity="0.5"/>
    <circle cx="1250" cy="400" r="16" fill="#C9A96E" opacity="0.55"/>
    <path d="M 1180 350 L 1220 320 L 1230 370 Z" fill="#C9A96E" opacity="0.5"/>
  </g>
  
  <!-- Text overlay -->
  <text x="800" y="550" font-family="Cormorant Garamond, serif" font-size="72" font-weight="300" fill="#C9A96E" text-anchor="middle">
    Central Canteen
  </text>
  <text x="800" y="640" font-family="Cormorant Garamond, serif" font-size="72" font-weight="300" fill="#C9A96E" text-anchor="middle">
  </text>
  <text x="800" y="750" font-family="DM Sans, sans-serif" font-size="32" fill="#C9A96E" text-anchor="middle" opacity="0.8">
    Breakfast to Evening Snacks • Affordable Meals
  </text>
</svg>