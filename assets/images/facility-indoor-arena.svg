<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <defs>
    <linearGradient id="indoor-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a1a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#200f15;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#indoor-grad)"/>
  
  <!-- Sports courts -->
  <g opacity="0.35">
    <!-- Court 1 -->
    <rect x="200" y="250" width="280" height="180" fill="none" stroke="#C9A96E" stroke-width="2" rx="6"/>
    <line x1="340" y1="250" x2="340" y2="430" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
    <circle cx="270" cy="340" r="40" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.5"/>
    <circle cx="410" cy="340" r="40" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Court 2 -->
    <rect x="650" y="250" width="280" height="180" fill="none" stroke="#C9A96E" stroke-width="2" rx="6"/>
    <line x1="790" y1="250" x2="790" y2="430" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
    <rect x="680" y="280" width="60" height="120" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.5" rx="4"/>
    <rect x="840" y="280" width="60" height="120" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.5" rx="4"/>
    
    <!-- Court 3 -->
    <rect x="1100" y="250" width="280" height="180" fill="none" stroke="#C9A96E" stroke-width="2" rx="6"/>
    <line x1="1240" y1="250" x2="1240" y2="430" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Fitness equipment symbol -->
  <g opacity="0.2">
    <rect x="400" y="650" width="80" height="120" fill="none" stroke="#C9A96E" stroke-width="2" rx="4"/>
    <circle cx="440" cy="700" r="15" fill="none" stroke="#C9A96E" stroke-width="2"/>
    <circle cx="460" cy="700" r="15" fill="none" stroke="#C9A96E" stroke-width="2"/>
    
    <rect x="950" y="650" width="80" height="120" fill="none" stroke="#C9A96E" stroke-width="2" rx="4"/>
    <line x1="960" y1="680" x2="1020" y2="680" stroke="#C9A96E" stroke-width="2.5"/>
    <line x1="960" y1="740" x2="1020" y2="740" stroke="#C9A96E" stroke-width="2.5"/>
  </g>
  
  <!-- Text overlay -->
  <text x="800" y="550" font-family="Cormorant Garamond, serif" font-size="72" font-weight="300" fill="#C9A96E" text-anchor="middle">
    Indoor Courts
  </text>
  <text x="800" y="640" font-family="Cormorant Garamond, serif" font-size="72" font-weight="300" fill="#C9A96E" text-anchor="middle">
    and Fitness Arena
  </text>
  <text x="800" y="750" font-family="DM Sans, sans-serif" font-size="32" fill="#C9A96E" text-anchor="middle" opacity="0.8">
    Badminton • Table Tennis • Fitness Zone • Gym
  </text>
</svg>