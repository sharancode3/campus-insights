<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <defs>
    <linearGradient id="transport-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a2a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f1510;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#transport-grad)"/>
  
  <!-- Transport hub -->
  <g opacity="0.35">
    <!-- Bus 1 -->
    <rect x="250" y="280" width="200" height="140" fill="none" stroke="#C9A96E" stroke-width="2" rx="8"/>
    <line x1="260" y1="330" x2="440" y2="330" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
    <circle cx="300" cy="420" r="18" fill="none" stroke="#C9A96E" stroke-width="2.5" opacity="0.7"/>
    <circle cx="390" cy="420" r="18" fill="none" stroke="#C9A96E" stroke-width="2.5" opacity="0.7"/>
    
    <!-- Bus 2 -->
    <rect x="700" y="280" width="200" height="140" fill="none" stroke="#C9A96E" stroke-width="2" rx="8"/>
    <line x1="710" y1="330" x2="890" y2="330" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
    <circle cx="750" cy="420" r="18" fill="none" stroke="#C9A96E" stroke-width="2.5" opacity="0.7"/>
    <circle cx="840" cy="420" r="18" fill="none" stroke="#C9A96E" stroke-width="2.5" opacity="0.7"/>
    
    <!-- Bus 3 -->
    <rect x="1150" y="280" width="200" height="140" fill="none" stroke="#C9A96E" stroke-width="2" rx="8"/>
    <line x1="1160" y1="330" x2="1340" y2="330" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
    <circle cx="1200" cy="420" r="18" fill="none" stroke="#C9A96E" stroke-width="2.5" opacity="0.7"/>
    <circle cx="1290" cy="420" r="18" fill="none" stroke="#C9A96E" stroke-width="2.5" opacity="0.7"/>
  </g>
  
  <!-- Routes and stops -->
  <g opacity="0.2">
    <rect x="400" y="600" width="180" height="80" fill="none" stroke="#C9A96E" stroke-width="2" rx="4"/>
    <line x1="410" y1="620" x2="570" y2="620" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
    <line x1="410" y1="645" x2="570" y2="645" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
    <line x1="410" y1="670" x2="570" y2="670" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Text overlay -->
  <text x="800" y="550" font-family="Cormorant Garamond, serif" font-size="72" font-weight="300" fill="#C9A96E" text-anchor="middle">
    Transport &amp;
  </text>
  <text x="800" y="640" font-family="Cormorant Garamond, serif" font-size="72" font-weight="300" fill="#C9A96E" text-anchor="middle">
    Commute Hub
  </text>
  <text x="800" y="750" font-family="DM Sans, sans-serif" font-size="32" fill="#C9A96E" text-anchor="middle" opacity="0.8">
    Daily Bus Routes • Commute Coordination
  </text>
</svg>