<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <defs>
    <linearGradient id="health-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a3a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#151f1f;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#health-grad)"/>
  
  <!-- Medical facilities -->
  <g opacity="0.35">
    <!-- Reception -->
    <rect x="250" y="300" width="220" height="120" fill="none" stroke="#C9A96E" stroke-width="2" rx="6"/>
    <line x1="260" y1="340" x2="460" y2="340" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
    <line x1="260" y1="370" x2="460" y2="370" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Medical Cross Symbol -->
    <g transform="translate(700, 350)">
      <rect x="-50" y="-60" width="100" height="120" fill="none" stroke="#C9A96E" stroke-width="3" rx="8"/>
      <line x1="-20" y1="-50" x2="-20" y2="50" stroke="#C9A96E" stroke-width="3"/>
      <line x1="-50" y1="0" x2="50" y2="0" stroke="#C9A96E" stroke-width="3"/>
    </g>
    
    <!-- Consultation rooms -->
    <rect x="1100" y="300" width="200" height="120" fill="none" stroke="#C9A96E" stroke-width="2" rx="6"/>
    <line x1="1110" y1="340" x2="1290" y2="340" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
    <line x1="1110" y1="370" x2="1290" y2="370" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Healthcare symbols -->
  <g opacity="0.2">
    <circle cx="500" cy="650" r="40" fill="none" stroke="#C9A96E" stroke-width="2"/>
    <line x1="480" y1="650" x2="520" y2="650" stroke="#C9A96E" stroke-width="2.5"/>
    <line x1="500" y1="630" x2="500" y2="670" stroke="#C9A96E" stroke-width="2.5"/>
    
    <rect x="1000" y="620" width="80" height="60" fill="none" stroke="#C9A96E" stroke-width="2" rx="4"/>
    <circle cx="1040" cy="650" r="8" fill="#C9A96E" opacity="0.6"/>
    <circle cx="1060" cy="650" r="8" fill="#C9A96E" opacity="0.6"/>
  </g>
  
  <!-- Text overlay -->
  <text x="800" y="550" font-family="Cormorant Garamond, serif" font-size="72" font-weight="300" fill="#C9A96E" text-anchor="middle">
    Campus
  </text>
  <text x="800" y="640" font-family="Cormorant Garamond, serif" font-size="72" font-weight="300" fill="#C9A96E" text-anchor="middle">
    Health Center
  </text>
  <text x="800" y="750" font-family="DM Sans, sans-serif" font-size="32" fill="#C9A96E" text-anchor="middle" opacity="0.8">
    Medical Care • First Aid • Health Consultations
  </text>
</svg>