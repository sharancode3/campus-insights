<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <defs>
    <linearGradient id="cse-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a472a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1f15;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#cse-grad)"/>
  
  <!-- Code blocks visualization -->
  <g opacity="0.3">
    <rect x="200" y="150" width="300" height="250" fill="none" stroke="#C9A96E" stroke-width="2" rx="8"/>
    <line x1="220" y1="190" x2="480" y2="190" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
    <line x1="220" y1="220" x2="450" y2="220" stroke="#C9A96E" stroke-width="1.5" opacity="0.5"/>
    <line x1="220" y1="250" x2="470" y2="250" stroke="#C9A96E" stroke-width="1.5" opacity="0.4"/>
    <line x1="220" y1="280" x2="430" y2="280" stroke="#C9A96E" stroke-width="1.5" opacity="0.5"/>
    <line x1="220" y1="310" x2="460" y2="310" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
    
    <rect x="900" y="150" width="300" height="250" fill="none" stroke="#C9A96E" stroke-width="2" rx="8"/>
    <circle cx="950" cy="200" r="8" fill="#C9A96E" opacity="0.7"/>
    <circle cx="1050" cy="240" r="12" fill="none" stroke="#C9A96E" stroke-width="2" opacity="0.6"/>
    <path d="M 1050 290 L 1100 310 L 1000 320 Z" fill="none" stroke="#C9A96E" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- AI/ML symbols -->
  <g opacity="0.2">
    <circle cx="300" cy="700" r="80" fill="none" stroke="#C9A96E" stroke-width="3"/>
    <circle cx="250" cy="750" r="50" fill="none" stroke="#C9A96E" stroke-width="2"/>
    <circle cx="350" cy="750" r="50" fill="none" stroke="#C9A96E" stroke-width="2"/>
    <circle cx="300" cy="650" r="50" fill="none" stroke="#C9A96E" stroke-width="2"/>
  </g>
  
  <!-- Text overlay -->
  <text x="800" y="550" font-family="Cormorant Garamond, serif" font-size="72" font-weight="300" fill="#C9A96E" text-anchor="middle">
    Computer Science
  </text>
  <text x="800" y="640" font-family="Cormorant Garamond, serif" font-size="72" font-weight="300" fill="#C9A96E" text-anchor="middle">
