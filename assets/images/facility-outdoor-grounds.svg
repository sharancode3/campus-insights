<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <defs>
    <linearGradient id="outdoor-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a401a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f220f;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#outdoor-grad)"/>
  
  <!-- Sports grounds -->
  <g opacity="0.35">
    <!-- Cricket field -->
    <ellipse cx="400" cy="350" rx="200" ry="140" fill="none" stroke="#C9A96E" stroke-width="2"/>
    <circle cx="400" cy="350" r="60" fill="none" stroke="#C9A96E" stroke-width="2" opacity="0.7"/>
    <line x1="330" y1="350" x2="470" y2="350" stroke="#C9A96E" stroke-width="2" opacity="0.6"/>
    
    <!-- Football field -->
    <rect x="850" y="250" width="320" height="200" fill="none" stroke="#C9A96E" stroke-width="2" rx="8"/>
    <line x1="1010" y1="250" x2="1010" y2="450" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
    <circle cx="1010" cy="350" r="40" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Track outline -->
    <ellipse cx="1200" cy="650" rx="180" ry="120" fill="none" stroke="#C9A96E" stroke-width="2"/>
    <ellipse cx="1200" cy="650" rx="150" ry="90" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Goal posts -->
  <g opacity="0.2">
    <line x1="860" y1="250" x2="860" y2="180" stroke="#C9A96E" stroke-width="2.5"/>
    <line x1="860" y1="180" x2="920" y2="180" stroke="#C9A96E" stroke-width="2.5"/>
    <line x1="1160" y1="250" x2="1160" y2="180" stroke="#C9A96E" stroke-width="2.5"/>
    <line x1="1100" y1="180" x2="1160" y2="180" stroke="#C9A96E" stroke-width="2.5"/>
  </g>
  
  <!-- Text overlay -->
  <text x="800" y="550" font-family="Cormorant Garamond, serif" font-size="72" font-weight="300" fill="#C9A96E" text-anchor="middle">
    Cricket, Football &amp;
  </text>
  <text x="800" y="640" font-family="Cormorant Garamond, serif" font-size="72" font-weight="300" fill="#C9A96E" text-anchor="middle">
    Athletics Grounds
  </text>
  <text x="800" y="750" font-family="DM Sans, sans-serif" font-size="32" fill="#C9A96E" text-anchor="middle" opacity="0.8">
    Team Sports • Track Events • Practice Facilities
  </text>
</svg>