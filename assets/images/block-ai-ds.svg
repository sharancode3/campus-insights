<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <defs>
    <linearGradient id="ai-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a47;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1520;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#ai-grad)"/>
  
  <!-- Neural network visualization -->
  <g opacity="0.4">
    <!-- Input layer -->
    <circle cx="250" cy="300" r="12" fill="#C9A96E"/>
    <circle cx="250" cy="450" r="12" fill="#C9A96E"/>
    <circle cx="250" cy="600" r="12" fill="#C9A96E"/>
    
    <!-- Hidden layers -->
    <circle cx="600" cy="250" r="12" fill="#C9A96E"/>
    <circle cx="600" cy="400" r="12" fill="#C9A96E"/>
    <circle cx="600" cy="550" r="12" fill="#C9A96E"/>
    <circle cx="600" cy="700" r="12" fill="#C9A96E"/>
    
    <circle cx="1000" cy="350" r="12" fill="#C9A96E"/>
    <circle cx="1000" cy="550" r="12" fill="#C9A96E"/>
    
    <!-- Output layer -->
    <circle cx="1320" cy="450" r="12" fill="#C9A96E"/>
    
    <!-- Connections -->
    <line x1="262" y1="300" x2="588" y2="250" stroke="#C9A96E" stroke-width="1.5" opacity="0.5"/>
    <line x1="262" y1="300" x2="588" y2="400" stroke="#C9A96E" stroke-width="1.5" opacity="0.5"/>
    <line x1="262" y1="450" x2="588" y2="400" stroke="#C9A96E" stroke-width="1.5" opacity="0.5"/>
    <line x1="262" y1="450" x2="588" y2="550" stroke="#C9A96E" stroke-width="1.5" opacity="0.5"/>
    <line x1="262" y1="600" x2="588" y2="550" stroke="#C9A96E" stroke-width="1.5" opacity="0.5"/>
    <line x1="262" y1="600" x2="588" y2="700" stroke="#C9A96E" stroke-width="1.5" opacity="0.5"/>
    
    <line x1="612" y1="250" x2="988" y2="350" stroke="#C9A96E" stroke-width="1.5" opacity="0.5"/>
    <line x1="612" y1="400" x2="988" y2="350" stroke="#C9A96E" stroke-width="1.5" opacity="0.5"/>
    <line x1="612" y1="550" x2="988" y2="550" stroke="#C9A96E" stroke-width="1.5" opacity="0.5"/>
    <line x1="612" y1="700" x2="988" y2="550" stroke="#C9A96E" stroke-width="1.5" opacity="0.5"/>
    
    <line x1="1012" y1="350" x2="1308" y2="450" stroke="#C9A96E" stroke-width="1.5" opacity="0.5"/>
    <line x1="1012" y1="550" x2="1308" y2="450" stroke="#C9A96E" stroke-width="1.5" opacity="0.5"/>
  </g>
  
  <!-- Text overlay -->
  <text x="800" y="550" font-family="Cormorant Garamond, serif" font-size="72" font-weight="300" fill="#C9A96E" text-anchor="middle">
    AI &amp; Data Science
  </text>
  <text x="800" y="640" font-family="Cormorant Garamond, serif" font-size="72" font-weight="300" fill="#C9A96E" text-anchor="middle">
    Block
  </text>
  <text x="800" y="750" font-family="DM Sans, sans-serif" font-size="32" fill="#C9A96E" text-anchor="middle" opacity="0.8">
    Analytics Labs • ML Studio • Data Processing
  </text>
</svg>