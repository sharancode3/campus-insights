<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <defs>
    <linearGradient id="mech-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#472e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a1a0f;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#mech-grad)"/>
  
  <!-- Gear and mechanical elements -->
  <g opacity="0.3">
    <circle cx="300" cy="300" r="70" fill="none" stroke="#C9A96E" stroke-width="3"/>
    <circle cx="300" cy="300" r="40" fill="none" stroke="#C9A96E" stroke-width="2"/>
    <g stroke="#C9A96E" stroke-width="2">
      <line x1="300" y1="230" x2="300" y2="200"/>
      <line x1="345" y1="255" x2="365" y2="235"/>
      <line x1="370" y1="300" x2="400" y2="300"/>
      <line x1="345" y1="345" x2="365" y2="365"/>
    </g>
    
    <circle cx="800" cy="700" r="60" fill="none" stroke="#C9A96E" stroke-width="2.5" opacity="0.7"/>
    <circle cx="800" cy="700" r="35" fill="none" stroke="#C9A96E" stroke-width="2" opacity="0.7"/>
  </g>
  
  <!-- Workshop/CAD visualization -->
  <g opacity="0.2">
    <rect x="600" y="400" width="200" height="150" fill="none" stroke="#C9A96E" stroke-width="2" rx="6"/>
    <line x1="620" y1="430" x2="780" y2="430" stroke="#C9A96E" stroke-width="1.5"/>
    <line x1="620" y1="460" x2="750" y2="460" stroke="#C9A96E" stroke-width="1.5"/>
    <line x1="620" y1="490" x2="770" y2="490" stroke="#C9A96E" stroke-width="1.5"/>
    <line x1="620" y1="520" x2="730" y2="520" stroke="#C9A96E" stroke-width="1.5"/>
  </g>
  
  <!-- Text overlay -->
  <text x="800" y="550" font-family="Cormorant Garamond, serif" font-size="72" font-weight="300" fill="#C9A96E" text-anchor="middle">
    Mechanical
  </text>
  <text x="800" y="640" font-family="Cormorant Garamond, serif" font-size="72" font-weight="300" fill="#C9A96E" text-anchor="middle">
    Engineering Block
  </text>
  <text x="800" y="750" font-family="DM Sans, sans-serif" font-size="32" fill="#C9A96E" text-anchor="middle" opacity="0.8">
    Workshops • CAD Labs • Fabrication Spaces
  </text>
</svg>